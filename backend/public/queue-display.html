<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DocClinic Pro — Live Queue</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #1e3a8a 0%, #0b1220 60%); color: #e5e7eb;
      min-height: 100vh; display: flex; flex-direction: column;
    }
    header { padding: 24px 32px; display: flex; align-items: center; justify-content: space-between; }
    header .brand { font-size: 22px; font-weight: 800; letter-spacing: .5px; }
    header .clock { font-size: 18px; color: #93c5fd; }
    main { flex: 1; display: grid; grid-template-columns: 1.2fr 1fr; gap: 24px; padding: 0 32px 32px; }
    .card { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08); border-radius: 20px; padding: 28px; }
    .label { text-transform: uppercase; letter-spacing: 2px; font-size: 14px; color: #93c5fd; }
    .now-serving { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    .token { font-size: clamp(90px, 18vw, 220px); font-weight: 900; line-height: 1; color: #fff; text-shadow: 0 0 40px rgba(59,130,246,.6); }
    .name { font-size: clamp(20px, 3vw, 34px); color: #cbd5e1; margin-top: 8px; }
    .pulse { animation: pulse 1.6s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }
    .waiting-list { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 18px; }
    .chip { background: rgba(59,130,246,.15); border: 1px solid rgba(59,130,246,.35); border-radius: 14px; padding: 14px 18px; min-width: 90px; text-align: center; }
    .chip .t { font-size: 30px; font-weight: 800; color: #fff; }
    .chip .n { font-size: 13px; color: #94a3b8; }
    .stats { display: flex; gap: 28px; margin-top: 22px; }
    .stat .v { font-size: 30px; font-weight: 800; color: #fff; }
    .stat .k { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
    .status { font-size: 12px; color: #64748b; padding: 8px 32px 20px; }
    .dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#22c55e; margin-right:6px; }
    .dot.off { background:#ef4444; }
    .empty { color:#64748b; font-size: 18px; }
  </style>
</head>
<body>
  <header>
    <div class="brand">🩺 DocClinic Pro</div>
    <div class="clock" id="clock"></div>
  </header>
  <main>
    <section class="card now-serving">
      <div class="label">Now Serving</div>
      <div class="token pulse" id="nowToken">—</div>
      <div class="name" id="nowName"></div>
    </section>
    <section class="card">
      <div class="label">Waiting</div>
      <div class="waiting-list" id="waiting"><span class="empty">No patients waiting</span></div>
      <div class="stats">
        <div class="stat"><div class="v" id="statCompleted">0</div><div class="k">Completed</div></div>
        <div class="stat"><div class="v" id="statWaiting">0</div><div class="k">Waiting</div></div>
        <div class="stat"><div class="v" id="statTotal">0</div><div class="k">Total Today</div></div>
      </div>
    </section>
  </main>
  <div class="status"><span class="dot off" id="connDot"></span><span id="connText">Connecting…</span></div>

  <!-- Socket.IO client is served by the backend itself; no external CDN needed. -->
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const doctorId = params.get('doctorId');
    const $ = (id) => document.getElementById(id);

    function tick() {
      $('clock').textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }
    setInterval(tick, 1000); tick();

    function render(board) {
      if (!board) return;
      if (board.nowServing) {
        $('nowToken').textContent = board.nowServing.token ?? '—';
        $('nowName').textContent = board.nowServing.name || '';
      } else {
        $('nowToken').textContent = '—';
        $('nowName').textContent = 'Please wait';
      }
      const waiting = board.waiting || [];
      $('waiting').innerHTML = waiting.length
        ? waiting.map((w) => `<div class="chip"><div class="t">${w.token}</div><div class="n">${w.name || ''}</div></div>`).join('')
        : '<span class="empty">No patients waiting</span>';
      $('statCompleted').textContent = board.completed ?? 0;
      $('statWaiting').textContent = waiting.length;
      $('statTotal').textContent = board.totalToday ?? 0;
    }

    function setConn(ok, text) {
      $('connDot').className = 'dot' + (ok ? '' : ' off');
      $('connText').textContent = text;
    }

    async function poll() {
      if (!doctorId) { setConn(false, 'Missing ?doctorId in URL'); return; }
      try {
        const r = await fetch(`/api/self-service/queue-board/${doctorId}`);
        if (r.ok) { render(await r.json()); setConn(true, 'Live (polling)'); }
      } catch (e) { setConn(false, 'Reconnecting…'); }
    }

    // Real-time via Socket.IO with polling fallback every 10s.
    if (window.io && doctorId) {
      const socket = io({ path: '/socket.io' });
      socket.on('connect', () => { setConn(true, 'Live (real-time)'); socket.emit('join:queue', { doctorId }); poll(); });
      socket.on('disconnect', () => setConn(false, 'Reconnecting…'));
      socket.on('queue:summary', () => poll());
      socket.on('queue:refresh', () => poll());
    }
    poll();
    setInterval(poll, 10000);
  </script>
</body>
</html>
